<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chat - 智能对话</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI Chat">
    <link rel="apple-touch-icon" href="/manifest-icon-192.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="chat-app">
        <!-- 移动端侧边栏遮罩 -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-top-row">
                    <a href="/" class="sidebar-brand">AI Chat</a>
                    <button class="btn-close-sidebar" onclick="toggleSidebar()" title="收起菜单">✕</button>
                </div>
                <button class="btn-new-chat" onclick="createNewConversation(); if(isMobile()) toggleSidebar();">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    <span>新对话</span>
                </button>
            </div>
            <div class="conversation-list" id="conversationList">
                <div class="loading-spinner">加载中...</div>
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" th:text="${nickname?.charAt(0)?.toString()?.toUpperCase() ?: 'U'}"></div>
                    <span class="user-name" th:text="${nickname}">User</span>
                </div>
                <button class="btn-logout" onclick="logout()" title="退出登录">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- 主聊天区域 -->
        <main class="chat-main" id="chatMain">
            <!-- 移动端顶部栏 -->
            <div class="mobile-topbar">
                <button class="btn-menu" onclick="toggleSidebar()" title="菜单">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <span class="mobile-title">AI Chat</span>
                <button class="btn-menu" onclick="createNewConversation()" title="新对话">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>

            <!-- 消息列表 -->
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                            <line x1="9" y1="9" x2="9.01" y2="9"/>
                            <line x1="15" y1="9" x2="15.01" y2="9"/>
                        </svg>
                    </div>
                    <h2>有什么我可以帮你的？</h2>
                    <p class="welcome-hints">写作 · 编程 · 翻译 · 问答 · 生成文档</p>

                    <!-- 快捷工具 -->
                    <div class="welcome-tools">
                        <button class="tool-card" onclick="suggestGenerate('word')">
                            <span class="tool-icon">📄</span>
                            <span>生成Word</span>
                        </button>
                        <button class="tool-card" onclick="suggestGenerate('ppt')">
                            <span class="tool-icon">📊</span>
                            <span>生成PPT</span>
                        </button>
                        <button class="tool-card" onclick="document.getElementById('fileInput').click()">
                            <span class="tool-icon">🖼️</span>
                            <span>上传图片</span>
                        </button>
                    </div>

                    <!-- 日常小工具 -->
                    <div class="daily-tools">
                        <div class="daily-tools-title">日常工具</div>
                        <div class="daily-tools-grid">
                            <button class="daily-btn" onclick="quickCalc()">
                                <span class="daily-icon">🔢</span>
                                <span class="daily-label">计算器</span>
                            </button>
                            <button class="daily-btn" onclick="quickDate()">
                                <span class="daily-icon">📅</span>
                                <span class="daily-label">日期时间</span>
                            </button>
                            <button class="daily-btn" onclick="quickConvert()">
                                <span class="daily-icon">📏</span>
                                <span class="daily-label">单位换算</span>
                            </button>
                            <button class="daily-btn" onclick="quickNote()">
                                <span class="daily-icon">📝</span>
                                <span class="daily-label">速记</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div id="messageList" class="message-list"></div>
            </div>

            <!-- 隐藏的文件上传 -->
            <input type="file" id="fileInput" style="display:none" accept="image/*,.docx,.pdf,.txt,.md,.pptx" onchange="uploadFile(this)">

            <!-- 输入区域 -->
            <div class="input-container">
                <div class="input-wrapper">
                    <button class="btn-attach" onclick="document.getElementById('fileInput').click()" title="上传文件">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                        </svg>
                    </button>
                    <textarea id="messageInput" class="message-input"
                              placeholder="输入你的问题..." rows="1"
                              oninput="autoResize(this)"
                              onkeydown="handleKeyDown(event)"></textarea>
                    <button class="btn-send" id="sendButton" onclick="sendMessage()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <div class="input-tools" id="inputTools">
                    <span class="tool-tip" onclick="quickCalc()">计算</span>
                    <span class="tool-tip" onclick="quickDate()">日期</span>
                    <span class="tool-tip" onclick="quickConvert()">换算</span>
                    <span class="tool-tip" onclick="suggestGenerate('word')">Word</span>
                    <span class="tool-tip" onclick="suggestGenerate('ppt')">PPT</span>
                </div>
                <p class="input-footer">拖拽文件到此处上传 · 支持图片分析、文档互转</p>
            </div>
        </main>
    </div>

    <script src="/js/chat.js?v=4"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function(err) {
                console.log('SW registration failed:', err);
            });
        }

        // PWA Install Prompt
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            // Show install button if user hasn't installed yet
            setTimeout(function() {
                if (!window.matchMedia('(display-mode: standalone)').matches) {
                    // Could show a custom install banner here
                    console.log('PWA install available');
                }
            }, 10000);
        });
    </script>
</body>
</html>
