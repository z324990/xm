<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能对话平台</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI Chat">
    <link rel="apple-touch-icon" href="/manifest-icon-192.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="landing-container">
        <nav class="landing-nav">
            <div class="nav-brand">AI Chat</div>
            <div class="nav-links">
                <a href="/login" class="btn btn-outline">登录</a>
                <a href="/register" class="btn btn-primary">注册</a>
            </div>
        </nav>

        <main class="landing-main">
            <div class="hero">
                <div class="hero-icon">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                        <line x1="9" y1="9" x2="9.01" y2="9"/>
                        <line x1="15" y1="9" x2="15.01" y2="9"/>
                    </svg>
                </div>
                <h1>AI 智能对话平台</h1>
                <p class="hero-subtitle">基于先进 AI 模型的智能对话助手，为你提供专业、高效的对话体验</p>
                <div class="hero-actions">
                    <a href="/register" class="btn btn-primary btn-lg">开始使用</a>
                    <a href="/login" class="btn btn-outline btn-lg">登录</a>
                </div>
            </div>

            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                    </div>
                    <h3>智能对话</h3>
                    <p>支持多轮对话，理解上下文，回答各类问题</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                        </svg>
                    </div>
                    <h3>多对话管理</h3>
                    <p>创建多个对话，方便分类管理不同话题</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                        </svg>
                    </div>
                    <h3>快速响应</h3>
                    <p>流式输出技术，实时呈现 AI 回复内容</p>
                </div>
            </div>
        </main>

        <footer class="landing-footer">
            <p>&copy; 2024 AI Chat Platform. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
